<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | WhisperBox</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <!-- Google Fonts for Modern Look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="split-layout">
    <!-- Left Side: Branding & Illustration -->
    <div class="split-left">
      <div class="brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <span>WhisperBox</span>
      </div>
      
      <div class="illustration-container">
        <!-- Abstract Illustration matching the vibe -->
        <div class="abstract-shape shape-1"></div>
        <div class="abstract-shape shape-2"></div>
        <div class="illustration-card">
          <div class="card-line" style="width: 60%;"></div>
          <div class="card-line" style="width: 80%;"></div>
          <div class="card-line" style="width: 40%;"></div>
          <div class="card-line" style="width: 70%; margin-top: 20px;"></div>
        </div>
      </div>

      <div class="welcome-text">
        <h1>Welcome!</h1>
        <p>Get a real secure messaging environment on top of your privacy needs, with WhisperBox.</p>
        <div class="pagination-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Right Side: Auth Form -->
    <div class="split-right">
      <div class="form-container">
        <h2 id="formTitle">Log In</h2>
        
        <div class="toggle-container" id="toggleText">
          <p>Don't have an account? <a href="#" id="toggleAuth">Create an account</a></p>
          <p class="subtext">It will take less than a minute.</p>
        </div>

        <div id="errorMessage" class="error-msg hidden"></div>

        <form id="authForm" class="modern-form">
          <div id="usernameGroup" class="input-wrapper hidden">
            <input type="text" id="username" placeholder="Username (Unique ID)">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>

          <div class="input-wrapper">
            <input type="text" id="email" placeholder="Username" required>
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </div>
          
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Password" required>
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>

          <div id="confirmPasswordGroup" class="input-wrapper hidden">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </div>

          <div class="form-actions">
            <button type="submit" id="authBtn" class="btn-blue">
              <span class="btn-text">Sign in</span>
              <div class="spinner hidden"></div>
            </button>
            
            <label class="remember-me">
              <input type="checkbox">
              <span>Remember password</span>
            </label>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
