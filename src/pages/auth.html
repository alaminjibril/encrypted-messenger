<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | WhisperBox</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass animate-fade-in">
      <div class="auth-header">
        <div class="logo">WhisperBox</div>
        <p id="authSubtitle">Secure End-to-End Encrypted Messaging</p>
      </div>

      <form id="authForm">
        <div id="usernameGroup" class="input-group hidden">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="johndoe123">
        </div>

        <div class="input-group">
          <label for="email" id="emailLabel">Email Address</label>
          <input type="text" id="email" placeholder="name@example.com" required>
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="confirmPasswordGroup" class="input-group hidden">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••">
        </div>

        <button type="submit" id="authBtn" class="btn-primary">
          <span class="btn-text">Sign In</span>
          <div class="spinner hidden"></div>
        </button>
      </form>

      <div class="auth-footer">
        <p id="toggleText">Don't have an account? <a href="#" id="toggleAuth">Sign Up</a></p>
      </div>
      
      <div id="errorMessage" class="error-msg hidden"></div>
    </div>
  </div>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
